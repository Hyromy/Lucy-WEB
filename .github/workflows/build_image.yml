name: Push Docker Image

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run Lint
        run: npm run lint

      - name: Run Tests
        run: npm test

  build:
    needs: quality-gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set image tag
        run: |
          DATE_TAG=$(date +'%y.%m.%d')
          echo "TAG=${DATE_TAG}-${GITHUB_RUN_NUMBER}" >> "$GITHUB_ENV"

      - name: Build Docker Image
        run: |
          docker build \
            --build-arg VITE_DISCORD_CLIENT_ID='${{ vars.VITE_DISCORD_CLIENT_ID }}' \
            --build-arg VITE_DISCORD_REDIRECT_URI='${{ vars.VITE_DISCORD_REDIRECT_URI }}' \
            --build-arg VITE_API_URL='${{ vars.VITE_API_URL }}' \
            -t '${{ vars.DOCKER_USER }}/${{ vars.DOCKER_IMAGE }}:'"$TAG" \
            -t '${{ vars.DOCKER_USER }}/${{ vars.DOCKER_IMAGE }}:latest' \
            .

      - name: Login to Docker
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKER_USER }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Push Docker Image
        run: |
          docker push '${{ vars.DOCKER_USER }}/${{ vars.DOCKER_IMAGE }}:'"$TAG"
          docker push '${{ vars.DOCKER_USER }}/${{ vars.DOCKER_IMAGE }}:latest'
