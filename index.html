<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="shortcut icon" href="favicon-16.ico" type="image/x-icon">
    <link rel="shortcut icon" href="favicon-32.ico" type="image/x-icon">
    <link rel="shortcut icon" href="favicon-48.ico" type="image/x-icon">
    <title>Lucy</title>
    <script>
      (function () {
        document.documentElement.classList.add("no-transitions")

        const key = "theme"
        const storedTheme = localStorage.getItem(key) || "system"
        const resolvedTheme =
          storedTheme == "system"
            ? (window.matchMedia("(prefers-color-scheme: dark)").matches
              ? "dark"
              : "light"
            )
            : storedTheme

        document.documentElement.classList.remove("light", "dark")
        document.documentElement.classList.add(resolvedTheme)

        window.addEventListener("load", () => {
          document.documentElement.classList.remove("no-transitions")
        })
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
